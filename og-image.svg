<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1517"/>
      <stop offset="100%" style="stop-color:#2A2224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4918F"/>
      <stop offset="100%" style="stop-color:#E8C4C0"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#D4918F;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#D4918F;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- App Icon -->
  <g transform="translate(80, 180) scale(0.8)">
    <rect width="130" height="130" rx="28" fill="#FFF5F3"/>
    <rect x="22" y="32" width="86" height="72" rx="7" fill="#D4918F"/>
    <rect x="46" y="24" width="38" height="15" rx="5" fill="#D4918F"/>
    <circle cx="65" cy="62" r="21" fill="#2C2C2C"/>
    <circle cx="65" cy="62" r="16" fill="#1A1517"/>
    <circle cx="65" cy="62" r="11" fill="#0f0d0e"/>
    <rect x="22" y="88" width="86" height="16" fill="#c47e7c"/>
    <rect x="22" y="87.5" width="86" height="1.5" fill="#D4AF37" opacity="0.85"/>
    <path d="M98 76C98 74 96 71 93 71C90.5 71 89 73.5 88.5 74.8C88 73.5 86.5 71 84 71C81 71 79 74 79 76C79 80 88.5 86 88.5 86C88.5 86 98 80 98 76Z" fill="#D4AF37"/>
  </g>

  <!-- Text -->
  <text x="200" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#F5F0EB">Adventure Together</text>
  <text x="200" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#A89B9D">Scratch. Reveal. Adventure Together.</text>

  <text x="200" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#A89B9D" opacity="0.8">Personalised challenges that push couples</text>
  <text x="200" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#A89B9D" opacity="0.8">out of their comfort zone. AI-powered.</text>

  <!-- Feature pills -->
  <rect x="200" y="440" width="140" height="36" rx="18" fill="#D4918F" opacity="0.2"/>
  <text x="228" y="464" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#D4918F">200+ Challenges</text>

  <rect x="360" y="440" width="130" height="36" rx="18" fill="#D4918F" opacity="0.2"/>
  <text x="384" y="464" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#D4918F">AI Personalised</text>

  <rect x="510" y="440" width="120" height="36" rx="18" fill="#D4918F" opacity="0.2"/>
  <text x="534" y="464" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#D4918F">4 Rarity Tiers</text>

  <!-- Phone mockup on right -->
  <g transform="translate(820, 80)">
    <!-- Phone body -->
    <rect width="220" height="460" rx="36" fill="#2A2224" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Screen -->
    <rect x="10" y="10" width="200" height="440" rx="28" fill="#1A1517"/>
    <!-- Notch -->
    <rect x="60" y="10" width="100" height="24" rx="12" fill="#2A2224"/>
    <!-- Card area -->
    <rect x="22" y="120" width="176" height="240" rx="16" fill="#D4918F"/>
    <rect x="22" y="120" width="176" height="240" rx="16" fill="url(#accent)" opacity="0.3"/>
    <!-- Scratch text -->
    <text x="110" y="230" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">Scratch to</text>
    <text x="110" y="255" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">Reveal</text>
    <text x="110" y="285" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Your next adventure awaits</text>
    <!-- Rarity badge -->
    <rect x="75" y="135" width="70" height="22" rx="11" fill="rgba(0,0,0,0.3)"/>
    <text x="110" y="150" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D4AF37" text-anchor="middle">EPIC</text>
    <!-- Tab bar -->
    <rect x="10" y="400" width="200" height="50" rx="0" fill="#2A2224"/>
    <circle cx="42" cy="420" r="4" fill="#D4918F"/>
    <circle cx="84" cy="420" r="4" fill="#4A3F42"/>
    <circle cx="126" cy="420" r="4" fill="#4A3F42"/>
    <circle cx="168" cy="420" r="4" fill="#4A3F42"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>
</svg>
